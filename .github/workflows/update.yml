name: Auto-update Mundial 2026

on:
  schedule:
    - cron: '0 */2 * * *'    # cada 2 horas (UTC)
  workflow_dispatch: {}        # boton para correrlo a mano

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Actualizar resultados
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scripts/update_data.py
      - name: Commit si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "auto: resultados Mundial $(date -u +%FT%TZ)"
          git push
